# IoTS Project 3 — MQTT-only Docker Compose.
#
# Profiles:
#   docker compose --profile mqtt up -d                                      # TimescaleDB + Mosquitto
#   docker compose --profile mqtt --profile app up -d                        # + ingestion/storage/analytics
#   docker compose --profile mqtt --profile app --profile cep up -d          # + eKuiper CEP
#   docker compose --profile mqtt --profile app --profile cep --profile ml up -d      # + MaaS
#   docker compose --profile mqtt --profile app --profile cep --profile ml --profile web up -d  # + web app (full stack)
#
# TimescaleDB has no profile -> it is always started.
#
# Env values come from ./.env (copy from .env.example).

name: iots3

services:
  # ─────────────────────────── Database (always on) ───────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: iots-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iotdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [iot-net]

  # ─────────────────────────── MQTT broker (profile: mqtt) ────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iots-mosquitto
    profiles: [mqtt]
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (browser MQTT.js clients, e.g. the web app)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks: [iot-net]

  # ─────────────────────────── App services (profile: app) ────────────────────
  # Device simulator / publisher — the only publisher of raw telemetry to
  # sensors/telemetry. Broker config comes from .env (BROKER_TYPE=mqtt).
  ingestion:
    build:
      context: ../services
      dockerfile: ingestion-service/Dockerfile
    image: iots-ingestion:latest
    container_name: iots-ingestion
    profiles: [app]
    env_file: .env
    environment:
      CLIENT_ID: iots-ingestion        # stable, distinct MQTT client id
      QOS_LEVEL: ${QOS_LEVEL:-1}
      MQTT_CLEAN_SESSION: ${MQTT_CLEAN_SESSION:-true}
      MQTT_KEEPALIVE_SEC: ${MQTT_KEEPALIVE_SEC:-60}
    ports:
      - "${INGESTION_PORT:-3001}:3001"   # control surface: /health /stats POST /burst
    volumes:
      - ../data:/data:ro                 # dataset for DATA_SOURCE=replay
    restart: unless-stopped              # tolerate starting before the broker is ready
    networks: [iot-net]

  # Broker subscriber → TimescaleDB writer (the only DB writer). Reuses the same
  # broker adapter as ingestion (.env BROKER_TYPE/HOST/PORT/TOPIC).
  storage:
    build:
      context: ../services
      dockerfile: storage-service/Dockerfile
    image: iots-storage:latest
    container_name: iots-storage
    profiles: [app]
    env_file: .env
    environment:
      CLIENT_ID: iots-storage          # stable, distinct MQTT client id
      QOS_LEVEL: ${QOS_LEVEL:-1}
      MQTT_CLEAN_SESSION: ${MQTT_CLEAN_SESSION:-true}
      MQTT_KEEPALIVE_SEC: ${MQTT_KEEPALIVE_SEC:-60}
    ports:
      - "${STORAGE_PORT:-3002}:3002"     # control surface: /health /stats
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped              # tolerate starting before the broker is ready
    networks: [iot-net]

  # FastAPI orchestrator (Project 3): subscribes to sensors/events (eKuiper), calls
  # MaaS /predict for enrichment, emits [PREDICTIVE ALERT] and pushes `event`/`alert`
  # over Socket.IO to the web app + serves /api/* snapshot routes. Same port carries
  # REST + Socket.IO (single ASGI). Soft-depends on MaaS via env; if MaaS is down the
  # subscribe loop still runs and emits CEP-only alerts (forecast_available:false).
  analytics:
    build:
      context: ../services/analytics-service
    image: iots-analytics:latest
    container_name: iots-analytics
    profiles: [app]
    env_file: .env
    environment:
      MAAS_URL: "${MAAS_URL:-http://maas:8000}"
      MAAS_TIMEOUT_MS: "${MAAS_TIMEOUT_MS:-1000}"
      LAG_WINDOWS: "${LAG_WINDOWS:-4}"
      SOCKETIO_CORS_ORIGINS: "${SOCKETIO_CORS_ORIGINS:-*}"
    ports:
      - "${ANALYTICS_PORT:-3003}:3003"   # /health /stats /api/* /socket.io
    restart: unless-stopped              # tolerate starting before the broker is ready
    networks: [iot-net]

  # ─────────────────────────── MaaS (profile: ml) ─────────────────────────────
  # Model-as-a-Service (Phase 4): FastAPI wrapper over the RandomForest artifact
  # trained offline in Phase 3. Loads model once at startup, exposes /predict,
  # /health, /model/info. Stateless — no broker, no DB. Analytics is the only
  # client (Phase 5). Artifact ships IN the image (Dockerfile COPY).
  maas:
    build:
      context: ../maas
    image: iots-maas:latest
    container_name: iots-maas
    profiles: [ml]
    environment:
      MODEL_PATH: "${MODEL_PATH:-/models/model.joblib}"
      MODEL_META_PATH: "${MODEL_META_PATH:-/models/model_meta.json}"
      MAAS_PORT: "${MAAS_PORT:-8000}"
      LAG_WINDOWS: "${LAG_WINDOWS:-4}"
      WINDOW_SIZE: "${WINDOW_SIZE:-10}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    ports:
      - "${MAAS_PORT:-8000}:8000"
    restart: unless-stopped
    networks: [iot-net]

  # ─────────────────────────── eKuiper CEP (profile: cep) ─────────────────────
  # Streaming/CEP engine: subscribes to sensors/telemetry, applies SQL rules
  # (rollup + threshold), sinks tagged events to sensors/events. Rules are
  # provisioned reproducibly via the REST API by the one-shot job below — never
  # hand-created in the UI. Pinned tag (no :latest).
  ekuiper:
    image: lfedge/ekuiper:2.2.1-slim
    container_name: iots-ekuiper
    profiles: [cep]
    environment:
      MQTT_SOURCE__DEFAULT__SERVER: "tcp://mosquitto:1883"
      KUIPER__BASIC__CONSOLELOG: "true"
    ports:
      - "9081:9081"                      # REST management API
    depends_on: [mosquitto]
    restart: unless-stopped
    networks: [iot-net]

  # ─────────────────────────── Web app (profile: web) ─────────────────────────
  # React + Vite dashboard: subscribes to Analytics Socket.IO for `event` / `alert`,
  # loads initial data via REST /api/*, renders event feed + predictive alerts +
  # predicted-vs-actual chart. Non-blocking (D10) — nothing depends on it; the
  # pipeline runs whether the app is up or not.
  webapp:
    build:
      context: ../webapp
      args:
        # Baked at build-time. Override with WEBAPP_API_URL to point at a non-localhost host.
        VITE_API_URL: "${WEBAPP_API_URL:-http://localhost:3003}"
    image: iots-webapp:latest
    container_name: iots-webapp
    profiles: [web]
    ports:
      - "${WEBAPP_PORT:-8080}:80"
    restart: unless-stopped
    networks: [iot-net]

  # One-shot init: waits for the eKuiper REST API, then creates the stream and
  # POSTs the env-templated rules. Exits 0 when done; re-runnable (idempotent).
  ekuiper-provision:
    image: curlimages/curl:8.8.0
    container_name: iots-ekuiper-provision
    profiles: [cep]
    depends_on: [ekuiper]
    volumes:
      - ../ekuiper:/ekuiper:ro
    entrypoint: ["/bin/sh", "/ekuiper/provision.sh"]
    environment:
      EKUIPER_URL: "http://ekuiper:9081"
      RAW_TOPIC: "${TOPIC:-sensors/telemetry}"
      EVENTS_TOPIC: "${EVENTS_TOPIC:-sensors/events}"
      BROKER_URL: "tcp://mosquitto:1883"
      WINDOW_TYPE: "${WINDOW_TYPE:-tumbling}"
      WINDOW_UNIT: "${WINDOW_UNIT:-ss}"
      WINDOW_SIZE: "${WINDOW_SIZE:-10}"
      WINDOW_STEP: "${WINDOW_STEP:-}"
      CO_HIGH: "${CO_HIGH:-0.010}"
      SUSTAINED_TEMP: "${SUSTAINED_TEMP:-25.0}"
      TEMP_HIGH: "${TEMP_HIGH:-28.0}"
      HUMIDITY_LOW: "${HUMIDITY_LOW:-40.0}"
    restart: on-failure
    networks: [iot-net]

networks:
  iot-net:
    driver: bridge

volumes:
  timescale-data:
  mosquitto-data:
  mosquitto-log:
