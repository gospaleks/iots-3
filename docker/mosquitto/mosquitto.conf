# Eclipse Mosquitto configuration — IoTS Project 2
# See docs/REQUIREMENTS.md §6.1 and docs/DECISIONS.md §4 (MQTT notes).

# --- MQTT listener ---
listener 1883
protocol mqtt

# --- WebSocket listener (optional, for browser clients / dashboard) ---
listener 9001
protocol websockets

# No auth on a local benchmarking network (out of scope — DECISIONS §6).
allow_anonymous true

# --- Persistence (Scenario B: queue messages for offline clients) ---
persistence true
persistence_location /mosquitto/data/

# Retain persistent (clean_session=false) sessions for offline clients so a
# 30s disconnect can be recovered. Tune per Scenario B.
persistent_client_expiration 1h

# Per-client queue for QoS 1/2 while a client is offline. Default (1000) is far
# too small for burst/outage tests — raise it so Scenario B measures the broker,
# not an artificial queue cap. 0 = unlimited.
max_queued_messages 0
max_inflight_messages 0

# --- Logging ---
log_dest stdout
log_type all
connection_messages true
