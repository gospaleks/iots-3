# Eclipse Mosquitto configuration — IoTS Project 3 (MQTT-only).

# --- MQTT listener ---
listener 1883
protocol mqtt

# --- WebSocket listener (for browser MQTT.js clients, e.g. the web app) ---
listener 9001
protocol websockets

# No auth on a local dev network (out of scope).
allow_anonymous true

# --- Persistence (queue messages for offline clients) ---
persistence true
persistence_location /mosquitto/data/

# Retain persistent (clean_session=false) sessions so an offline subscriber can
# recover queued messages on reconnect.
persistent_client_expiration 1h

# Per-client queue for QoS 1/2 while a client is offline. Default (1000) can be
# small under load — 0 = unlimited.
max_queued_messages 0
max_inflight_messages 0

# --- Logging ---
log_dest stdout
log_type all
connection_messages true
